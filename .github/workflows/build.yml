name: Build Windows EXE

on:
  push:
    branches: [main, master]       # Auto-build on every push to main
  workflow_dispatch:               # Also allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest        # Must be Windows to build a .exe

    steps:
      # 1. Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js (match your local version)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies
      #    postinstall runs electron-rebuild automatically for better-sqlite3
      - name: Install dependencies
        run: npm ci

      # 4. Build Vite renderer + compile Electron main process + package .exe
      - name: Build and package
        run: npm run package
        env:
          # Prevents electron-builder from trying to publish/sign
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. Upload the installer as a downloadable artifact
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: cQikly-Windows-Installer
          path: release/*.exe
          retention-days: 30        # Keep the artifact for 30 days
